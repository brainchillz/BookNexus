services:
  web:
    # Prebuilt image published by GitHub Actions on every push to main
    # (amd64 + arm64). `docker compose pull` fetches it — no local build.
    # The build: section remains for developing from source
    # (`docker compose up -d --build` or `./deploy.sh --build`).
    image: ghcr.io/brainchillz/booknexus:latest
    build: .
    restart: unless-stopped
    ports:
      # APP_BIND=127.0.0.1 publishes on loopback only, for running behind a
      # reverse proxy on the same host; the default stays LAN-reachable.
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DB_PATH: data/books.db
      SITE_NAME: ${SITE_NAME:-}
      # Optional .env admin fallback — normally unset; the first-run setup
      # wizard stores the credential in the database instead.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # Single-quote a hash in .env so its '$' chars survive compose parsing
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TLS_CERT: ${TLS_CERT:-}
      TLS_KEY: ${TLS_KEY:-}
      HTTPS: ${HTTPS:-false}
      PROXY_FIX: ${PROXY_FIX:-false}
    volumes:
      # The SQLite database lives here on the host — this directory IS your
      # library. Must be writable by uid 10001 (the container user);
      # deploy.sh sets that up.
      - ./data:/app/data
      # TLS certs (optional); key readable by uid/gid 10001
      - ./certs:/app/certs:ro
