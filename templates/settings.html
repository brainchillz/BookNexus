{% extends "base.html" %}
{% block title %}Settings — {{ site_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <h1 class="h3 mb-4">Settings</h1>

        <form method="post" class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <h2 class="h6">Library title</h2>
                <div class="mb-3">
                    <input type="text" name="site_title" class="form-control" value="{{ site_title }}">
                </div>
                <h2 class="h6 mt-4">Change password <span class="text-muted small fw-normal">(leave blank to keep the current one)</span></h2>
                <div class="mb-3">
                    <label class="form-label">Current password</label>
                    <input type="password" name="current_password" class="form-control" autocomplete="current-password">
                </div>
                <div class="mb-3">
                    <label class="form-label">New password <span class="text-muted small">(at least 8 characters)</span></label>
                    <input type="password" name="new_password" class="form-control" autocomplete="new-password">
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm new password</label>
                    <input type="password" name="confirm_password" class="form-control" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
