{% extends "base.html" %}
{% block title %}Series — {{ site_title }}{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Series <span class="badge bg-secondary fs-6">{{ series_list | length }}</span></h1>

<div class="mb-3">
    <input type="text" id="series-filter" class="form-control" placeholder="Filter series...">
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-2" id="series-container">
    {% for s in series_list %}
    <div class="col series-item">
        <a href="/series/{{ s.series | urlencode }}"
           class="d-flex justify-content-between align-items-center p-2 rounded border text-decoration-none text-body series-link">
            <span>{{ s.series }}</span>
            <span class="badge bg-secondary">{{ s.book_count }}</span>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}

{% block scripts %}
<script>
$('#series-filter').on('input', function() {
    var val = $(this).val().toLowerCase();
    $('.series-item').each(function() {
        var name = $(this).find('.series-link span:first').text().toLowerCase();
        $(this).toggle(name.includes(val));
    });
});
</script>
{% endblock %}
