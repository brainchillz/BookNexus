{% extends "base.html" %}
{% block title %}{{ site_title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">All Books</h1>
    {% if session.logged_in %}
    <a href="/books/add" class="btn btn-primary btn-sm">+ Add Book</a>
    {% endif %}
</div>

<table id="books-table" class="table table-striped table-hover table-sm" style="width:100%">
    <thead>
        <tr>
            <th>Author</th>
            <th>Title</th>
            <th>Series</th>
            <th>Series #</th>
            {% if session.logged_in %}<th>Actions</th>{% endif %}
        </tr>
    </thead>
</table>
{% endblock %}

{% block scripts %}
<script>
$(function() {
    var isAdmin = {{ 'true' if session.logged_in else 'false' }};
    var csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

    var columns = [
        {
            data: 'author',
            render: function(data) {
                if (!data) return '';
                return '<a href="/authors/' + encodeURIComponent(data) + '" class="text-decoration-none">'
                     + escHtml(data) + '</a>';
            }
        },
        {
            data: 'title',
            render: function(data, type, row) {
                if (!data) return '';
                return '<a href="#" class="book-title-link text-decoration-none" data-book-id="'
                     + row.id + '">' + escHtml(data) + '</a>';
            }
        },
        {
            data: 'series',
            render: function(data) {
                if (!data) return '';
                return '<a href="/series/' + encodeURIComponent(data) + '" class="text-decoration-none">'
                     + escHtml(data) + '</a>';
            }
        },
        { data: 'series_num', className: 'text-center', render: $.fn.dataTable.render.text() }
    ];

    if (isAdmin) {
        columns.push({
            data: 'id',
            orderable: false,
            searchable: false,
            className: 'text-nowrap',
            render: function(id) {
                return '<a href="/books/' + id + '/edit" class="btn btn-sm btn-outline-secondary me-1">Edit</a>'
                     + '<form method="post" action="/books/' + id + '/delete" style="display:inline"'
                     + ' onsubmit="return confirm(\'Delete this book?\')">'
                     + '<input type="hidden" name="csrf_token" value="' + escHtml(csrfToken) + '">'
                     + '<button type="submit" class="btn btn-sm btn-outline-danger">Del</button></form>';
            }
        });
    }

    $('#books-table').DataTable({
        processing: true,
        serverSide: true,
        ajax: '/api/books',
        columns: columns,
        pageLength: 25,
        lengthMenu: [10, 25, 50, 100],
        order: [[0, 'asc']],
        language: {
            search: '',
            searchPlaceholder: 'Search title, author, or series...',
            processing: '<div class="spinner-border spinner-border-sm text-secondary" role="status"></div>'
        }
    });

    function escHtml(s) {
        return $('<div>').text(s).html();
    }
});
</script>
{% endblock %}
